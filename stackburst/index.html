<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StackBurst | Neon Synthwave Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud" class="hud-container">
            <div class="hud-item">
                <span class="label">SKOR</span>
                <span id="score" class="value neon-text-blue">0</span>
            </div>
            <div class="hud-item" style="text-align: right;">
                <span id="levelIndicator" class="value neon-text-pink">SEVİYE 1</span>
            </div>
        </div>

        <div id="startScreen" class="screen-overlay active">
            <div class="panel glass-panel">
                <h1 class="game-title main-neon-glow">STACK<br><span class="neon-text-pink">BURST</span></h1>
                <p class="game-subtitle">Neon Blokları Eşleştir, Kuleyi Çökertme!</p>
                <div class="menu-actions">
                    <button id="startBtn" class="btn btn-primary pulse-btn">OYUNU BAŞLAT</button>
                </div>
            </div>
        </div>

        <div id="gameOverScreen" class="screen-overlay" style="display: none;">
            <div class="panel glass-panel">
                <h2 class="screen-title neon-text-red">SİSTEM ÇÖKTÜ</h2>
                <div class="score-display">
                    <span class="label">TOPLAM SKOR</span>
                    <span id="finalScore" class="final-score-val neon-text-yellow">0</span>
                </div>
                <div class="menu-actions">
                    <button id="restartBtn" class="btn btn-primary">YENİDEN DENE</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./game.js"></script>
</body>
</html>
