<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravity Loop — Button Control Edition</title>
    <script src="https://www.gstatic.com/games/sdk/v1/google-html5-games-sdk.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #07070B;
            color: #ECEDF1;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 450px;
            padding: 10px;
        }
        canvas {
            background-color: #12121A;
            box-shadow: 0 0 35px rgba(232, 36, 44, 0.15);
            border-radius: 24px;
            border: 1px solid rgba(38, 38, 47, 0.7);
            width: 100%;
            height: auto;
            aspect-ratio: 1;
        }
        .button-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
        }
        .color-btn {
            height: 60px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .color-btn:active {
            transform: scale(0.92);
        }
        #btn-0 { background-color: #E8242C; box-shadow: 0 0 15px rgba(232, 36, 44, 0.4); }
        #btn-1 { background-color: #00ffcc; box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); }
        #btn-2 { background-color: #ffcc00; box-shadow: 0 0 15px rgba(255, 204, 0.4); }
        #btn-3 { background-color: #9900ff; box-shadow: 0 0 15px rgba(153, 0, 255, 0.4); }

        .instructions {
            font-size: 13px;
            color: #71717F;
            text-align: center;
            margin-top: 5px;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<div class="game-container">
    <canvas id="gameCanvas" width="450" height="450"></canvas>

    <div class="button-container">
        <div id="btn-0" class="color-btn" onclick="handleColorInput(0)"></div>
        <div id="btn-1" class="color-btn" onclick="handleColorInput(1)"></div>
        <div id="btn-2" class="color-btn" onclick="handleColorInput(2)"></div>
        <div id="btn-3" class="color-btn" onclick="handleColorInput(3)"></div>
    </div>
    
    <div class="instructions">GELEN TOPUN RENGİNDEKİ BUTONA BAS!</div>
</div>

<script>
const gameCanvas = document.getElementById("gameCanvas");
const gameCtx = gameCanvas.getContext("2d");

const GAME_COLORS = ["#E8242C", "#00ffcc", "#ffcc00", "#9900ff"];
let gameScore = 0;
let gameLevel = 1;
let gameIsOver = false;

const SKORES_PER_LEVEL = 5; 
const BASE_SPEED = 1.3;
const SPEED_INCREMENT = 0.4; 

const gameLoopObj = {
    x: gameCanvas.width / 2,
    y: gameCanvas.height / 2,
    radius: 170, 
    targetAngle: 0,
    currentAngle: 0
};

let gameBall = {
    x: gameCanvas.width / 2,
    y: gameCanvas.height / 2,
    radius: 12,
    colorIndex: 0,
    speed: BASE_SPEED,
    angle: 0,
    active: true
};

// YouTube Playables SDK Entegrasyonu (Güvenli Kontrol Bloğu)
let youtubeSdk = null;
if (typeof google !== 'undefined' && google.html5games) {
    google.html5games.initAsync().then((sdk) => {
        youtubeSdk = sdk;
        youtubeSdk.gameLoadingComplete();
    }).catch((err) => { console.error("SDK Init Hatası:", err); });

    google.html5games.onPause(() => { gameIsOver = true; });
    google.html5games.onResume(() => { gameIsOver = false; });
} else {
    console.log("Normal tarayıcı modu: YouTube SDK pas geçildi, oyun sorunsuz başlatılıyor.");
}

function spawnNewBall() {
    gameBall.x = gameCanvas.width / 2;
    gameBall.y = gameCanvas.height / 2;
    gameBall.colorIndex = Math.floor(Math.random() * 4);
    gameBall.angle = Math.random() * Math.PI * 2;
    gameBall.speed = BASE_SPEED + (gameLevel - 1) * SPEED_INCREMENT;
    gameBall.active = true;
}

spawnNewBall();

function handleColorInput(colorIdx) {
    if (gameIsOver) {
        gameScore = 0;
        gameLevel = 1;
        gameIsOver = false;
        gameLoopObj.currentAngle = 0;
        gameLoopObj.targetAngle = 0;
        spawnNewBall();
        return;
    }

    let segmentOffset = colorIdx * (Math.PI / 2);
    gameLoopObj.targetAngle = gameBall.angle - segmentOffset - (Math.PI / 4);
}

gameCanvas.addEventListener("pointerdown", (e) => {
    if (gameIsOver) handleColorInput(0);
});

function updateGame() {
    if (gameIsOver) return;

    let angleDiff = gameLoopObj.targetAngle - gameLoopObj.currentAngle;
    gameLoopObj.currentAngle += angleDiff * 0.3;

    gameBall.x += Math.cos(gameBall.angle) * gameBall.speed;
    gameBall.y += Math.sin(gameBall.angle) * gameBall.speed;

    let dx = gameBall.x - gameLoopObj.x;
    let dy = gameBall.y - gameLoopObj.y;
    let distance = Math.sqrt(dx * dx + dy * dy);

    if (distance >= gameLoopObj.radius - gameBall.radius && gameBall.active) {
        gameBall.active = false;

        let hitAngle = Math.atan2(dy, dx);
        if (hitAngle < 0) hitAngle += Math.PI * 2;

        let relativeAngle = (hitAngle - gameLoopObj.currentAngle) % (Math.PI * 2);
        if (relativeAngle < 0) relativeAngle += Math.PI * 2;

        let segmentHit = Math.floor(relativeAngle / (Math.PI / 2)) % 4;

        if (segmentHit === gameBall.colorIndex) {
            gameScore++; 
            gameLevel = Math.floor(gameScore / SKORES_PER_LEVEL) + 1;
            spawnNewBall();
        } else {
            gameIsOver = true;
        }
    }
}

function drawGame() {
    gameCtx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);

    for (let i = 0; i < 4; i++) {
        gameCtx.beginPath();
        let startAngle = gameLoopObj.currentAngle + (i * Math.PI / 2);
        let endAngle = startAngle + (Math.PI / 2);
        gameCtx.arc(gameLoopObj.x, gameLoopObj.y, gameLoopObj.radius, startAngle, endAngle);
        gameCtx.lineWidth = 16;
        gameCtx.strokeStyle = GAME_COLORS[i];
        gameCtx.stroke();
    }

    if (!gameIsOver) {
        gameCtx.beginPath();
        gameCtx.arc(gameBall.x, gameBall.y, gameBall.radius, 0, Math.PI * 2);
        gameCtx.fillStyle = GAME_COLORS[gameBall.colorIndex];
        gameCtx.fill();
        
        gameCtx.beginPath();
        gameCtx.arc(gameLoopObj.x, gameLoopObj.y, 6, 0, Math.PI * 2);
        gameCtx.fillStyle = "rgba(255,255,255,0.2)";
        gameCtx.fill();
    }

    gameCtx.fillStyle = "#ECEDF1";
    gameCtx.font = "bold 18px sans-serif";
    gameCtx.textAlign = "left";
    gameCtx.fillText("SCORE: " + gameScore, 30, 45);
    
    gameCtx.textAlign = "right";
    gameCtx.fillStyle = "#E8242C";
    gameCtx.fillText("LEVEL: " + gameLevel, gameCanvas.width - 30, 45);

    if (gameIsOver) {
        gameCtx.fillStyle = "rgba(7, 7, 11, 0.95)";
        gameCtx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
        
        gameCtx.fillStyle = "#E8242C";
        gameCtx.font = "bold 34px sans-serif";
        gameCtx.textAlign = "center";
        gameCtx.fillText("GAME OVER", gameCanvas.width / 2, gameCanvas.height / 2 - 15);
        
        gameCtx.fillStyle = "#ECEDF1";
        gameCtx.font = "14px sans-serif";
        gameCtx.fillText("Butonlardan Birine Basarak Yeniden Başla", gameCanvas.width / 2, gameCanvas.height / 2 + 25);
    }
}

function runGameEngine() {
    updateGame();
    drawGame();
    requestAnimationFrame(runGameEngine);
}
runGameEngine();
</script>
</body>
</html>
