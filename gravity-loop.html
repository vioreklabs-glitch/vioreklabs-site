<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravity Loop - Orbit Survival</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { width: 100%; height: 100%; background-color: #0b0b16; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        #gameContainer { width: 100%; height: 100%; position: relative; display: flex; justify-content: center; align-items: center; }
        canvas { background: radial-gradient(circle, #161632 0%, #080811 100%); width: 100%; height: 100%; display: block; }
        .hud { position: absolute; top: 25px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; pointer-events: none; }
        .hud-item { color: #fff; font-size: 20px; font-weight: 800; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .score-box { color: #39ff14; text-shadow: 0 0 12px #39ff14; }
        .screen-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(8, 8, 17, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; padding: 20px; text-align: center; }
        h1 { color: #ff007f; font-size: 42px; margin-bottom: 10px; text-shadow: 0 0 20px #ff007f; letter-spacing: 4px; }
        p { color: #00f0ff; font-size: 16px; margin-bottom: 30px; text-shadow: 0 0 8px #00f0ff; }
        .btn { padding: 15px 40px; font-size: 18px; font-family: 'Orbitron', sans-serif; font-weight: 800; background: transparent; border: 3px solid #39ff14; color: #39ff14; border-radius: 50px; cursor: pointer; text-shadow: 0 0 10px #39ff14; box-shadow: 0 0 15px rgba(57, 255, 20, 0.3); transition: all 0.3s; letter-spacing: 2px; }
        .btn:hover { background: #39ff14; color: #080811; box-shadow: 0 0 25px #39ff14; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="hud">
        <div class="hud-item score-box">SKOR: <span id="loopScore">0</span></div>
        <div class="hud-item" id="loopLevel">SEVİYE: 1</div>
    </div>

    <div id="govScreen" class="screen-overlay" style="display: none;">
        <h1 id="govTitle">OYUN BİTTİ</h1>
        <p>Kozmik yörüngeden fırlatıldın!</p>
        <p style="color: #fff; font-size: 24px; margin-bottom: 20px;">SKORUN: <span id="finalLoopScore">0</span></p>
        <button class="btn" id="restartLoopBtn">YENİDEN BAŞLA</button>
    </div>

    <canvas id="loopCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('loopCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('gameContainer');

    let W, H, centerX, centerY, orbitRadius;
    let gameState = 'playing';
    let score = 0;
    let level = 1;
    
    // FPS KİLİTLEME VE SAKİN HIZ AYARLARI
    let lastTime = 0;
    const fpsInterval = 1000 / 60; // 60 FPS Sabitleyici
    let frameCount = 0;

    // Oyuncu Ayarları (Tamamen Dengelendi)
    let player = {
        angle: 0,
        speed: 0.04,        // Dönüş hızı sakinleştirildi (Eski: 0.08)
        radius: 12,
        color: '#00f0ff'
    };

    let obstacles = [];
    let particles = [];
    let spawnTimer = 0;
    let baseSpawnInterval = 120; // Engeller daha seyrek gelecek

    function resize() {
        W = container.clientWidth;
        H = container.clientHeight;
        canvas.width = W;
        canvas.height = H;
        centerX = W / 2;
        centerY = H / 2;
        orbitRadius = Math.min(W, H) * 0.32;
    }
    window.addEventListener('resize', resize);

    class Obstacle {
        constructor() {
            this.radius = Math.random() * 8 + 6;
            this.color = '#ff007f';
            // Merkezden dışarı veya dışarıdan merkeze doğru akış
            if(Math.random() < 0.5) {
                this.x = centerX + (Math.random() - 0.5) * 40;
                this.y = centerY + (Math.random() - 0.5) * 40;
                const angle = Math.random() * Math.PI * 2;
                const speedMag = 1.8 + Math.random() * 1.2; // Hız düşürüldü
                this.vx = Math.cos(angle) * speedMag;
                this.vy = Math.sin(angle) * speedMag;
            } else {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.max(W, H);
                this.x = centerX + Math.cos(angle) * dist;
                this.y = centerY + Math.sin(angle) * dist;
                const targetAngle = angle + Math.PI + (Math.random() - 0.5) * 0.5;
                const speedMag = 2.0 + Math.random() * 1.0;
                this.vx = Math.cos(targetAngle) * speedMag;
                this.vy = Math.sin(targetAngle) * speedMag;
            }
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
        }
        draw() {
            ctx.save();
            ctx.shadowColor = this.color;
            ctx.shadowBlur = 10;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    function spawnObstacle() {
        obstacles.push(new Obstacle());
    }

    function checkCollisions() {
        const px = centerX + Math.cos(player.angle) * orbitRadius;
        const py = centerY + Math.sin(player.angle) * orbitRadius;

        for (let i = 0; i < obstacles.length; i++) {
            const obs = obstacles[i];
            const dist = Math.hypot(px - obs.x, py - obs.y);
            if (dist < player.radius + obs.radius) {
                gameOver();
                break;
            }
        }
    }

    function gameLoop(timestamp) {
        if (gameState !== 'playing') return;

        if (!timestamp) timestamp = 0;
        const elapsed = timestamp - lastTime;

        if (elapsed > fpsInterval) {
            lastTime = timestamp - (elapsed % fpsInterval);
            frameCount++;

            ctx.clearRect(0, 0, W, H);

            // Yörünge Çemberini Çiz
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
            ctx.lineWidth = 3;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.arc(centerX, centerY, orbitRadius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            // Oyuncuyu Güncelle ve Çiz
            player.angle += player.speed;
            const px = centerX + Math.cos(player.angle) * orbitRadius;
            const py = centerY + Math.sin(player.angle) * orbitRadius;

            ctx.save();
            ctx.shadowColor = player.color;
            ctx.shadowBlur = 15;
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(px, py, player.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Engelleri Yönet
            spawnTimer++;
            const currentInterval = Math.max(45, baseSpawnInterval - (level * 8));
            if (spawnTimer >= currentInterval) {
                spawnObstacle();
                spawnTimer = 0;
                score += 10;
                document.getElementById('loopScore').textContent = score;
                if(score % 100 === 0) {
                    level++;
                    document.getElementById('loopLevel').textContent = `SEVİYE: ${level}`;
                }
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.update();
                obs.draw();

                // Ekrandan çok çıkanları temizle
                if (Math.hypot(obs.x - centerX, obs.y - centerY) > Math.max(W, H) * 1.5) {
                    obstacles.splice(i, 1);
                }
            }

            checkCollisions();
        }

        requestAnimationFrame(gameLoop);
    }

    function gameOver() {
        gameState = 'gameover';
        document.getElementById('finalLoopScore').textContent = score;
        document.getElementById('govScreen').style.display = 'flex';
    }

    function startLoopGame() {
        gameState = 'playing';
        score = 0;
        level = 1;
        spawnTimer = 0;
        obstacles = [];
        player.angle = 0;
        lastTime = 0;
        document.getElementById('loopScore').textContent = '0';
        document.getElementById('loopLevel').textContent = 'SEVİYE: 1';
        document.getElementById('govScreen').style.display = 'none';
        requestAnimationFrame(gameLoop);
    }

    // Ekran Tıklama Kontrolü (Yön Değiştirme)
    window.addEventListener('touchstart', (e) => {
        if(gameState === 'playing') player.speed *= -1;
    });
    window.addEventListener('mousedown', (e) => {
        if(gameState === 'playing' && e.target.id !== 'restartLoopBtn') player.speed *= -1;
    });

    document.getElementById('restartLoopBtn').addEventListener('click', startLoopGame);

    resize();
    startLoopGame();
</script>
</body>
</html>
